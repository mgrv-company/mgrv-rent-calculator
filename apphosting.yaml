# Firebase App Hosting 백엔드 설정
# 운영: mgrv-growth-opservice-db (asia-east1)

runConfig:
  cpu: 1
  memoryMiB: 512
  maxInstances: 10
  minInstances: 0
  concurrency: 80
  timeoutSeconds: 60

env:
  # ─── Secret Manager 매핑 ──────────────────────────────────────────────
  # 이 키들은 API 라우트(런타임)에서만 쓰임 → RUNTIME-only.
  # BUILD availability를 주면 빌드 SA가 secretAccessor 권한을 요구해
  # 빌드 시 PermissionDenied 발생 (buildpacks #561 함정). 빌드는 키 불필요.
  # 사전 1회: firebase apphosting:secrets:grantaccess <SECRET> --backend <BACKEND>
  - variable: DATA_GO_KR_API_KEY
    secret: DATA_GO_KR_API_KEY
    availability:
      - RUNTIME

  - variable: VWORLD_API_KEY
    secret: VWORLD_API_KEY
    availability:
      - RUNTIME

  # ─── 평문 환경변수 (비밀 아님) ─────────────────────────────────────
  - variable: VWORLD_REFERER
    value: https://www.mangrove.city
    availability:
      - BUILD
      - RUNTIME

  - variable: RENT_LEADS_SHEET_ID
    value: 1oa8jnbmYiN4T-5EO1FtOYPoTuvoG9YRHROXlnfXy5C4
    availability:
      - BUILD
      - RUNTIME

  - variable: RENT_LEADS_SHEET_TAB
    value: 계산기_raw
    availability:
      - BUILD
      - RUNTIME

  - variable: GCLOUD_PROJECT
    value: mgrv-growth-opservice-db
    availability:
      - BUILD
      - RUNTIME
