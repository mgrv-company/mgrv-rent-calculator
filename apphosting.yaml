# Firebase App Hosting 백엔드 설정
# 운영: mgrv-growth-opservice-db (asia-northeast3)
# 백엔드 처음 생성 시 GitHub repo 연결 + 첫 배포 자동 트리거.

runConfig:
  # Next.js 16 + Turbopack 빌드 + 한국 IP 안정성 (MOLIT/V-World)
  cpu: 1
  memoryMiB: 512
  maxInstances: 10
  minInstances: 0
  concurrency: 80
  timeoutSeconds: 60

env:
  # ─── 외부 API key (Cloud Secret Manager) ────────────────────────────
  - variable: DATA_GO_KR_API_KEY
    secret: DATA_GO_KR_API_KEY
    availability:
      - RUNTIME

  - variable: VWORLD_API_KEY
    secret: VWORLD_API_KEY
    availability:
      - RUNTIME

  # ─── 평문 환경변수 (비밀 아님) ─────────────────────────────────────
  - variable: VWORLD_REFERER
    value: https://www.mangrove.city
    availability:
      - RUNTIME

  - variable: RENT_LEADS_SHEET_ID
    value: 1oa8jnbmYiN4T-5EO1FtOYPoTuvoG9YRHROXlnfXy5C4
    availability:
      - RUNTIME

  - variable: RENT_LEADS_SHEET_TAB
    value: 계산기_raw
    availability:
      - RUNTIME

  # ─── Sheets 인증 ────────────────────────────────────────────────────
  # Firebase App Hosting runtime SA (firebase-app-hosting-compute@...)가
  # ADC 자동 인증. 별도 SA 키 파일 불필요.
  # → 백엔드 생성 후 그 SA 이메일을 Sheets A 편집자로 추가 필요.
