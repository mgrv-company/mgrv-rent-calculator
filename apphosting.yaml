# Firebase App Hosting 백엔드 설정
# 운영: mgrv-growth-opservice-db (asia-east1)
# 백엔드 처음 생성 시 GitHub repo 연결 + 첫 배포 자동 트리거.

runConfig:
  cpu: 1
  memoryMiB: 512
  maxInstances: 10
  minInstances: 0
  concurrency: 80
  timeoutSeconds: 60

env:
  # 평문 환경변수 (비밀 아님)
  - variable: VWORLD_REFERER
    value: https://www.mangrove.city
    availability:
      - RUNTIME

  - variable: RENT_LEADS_SHEET_ID
    value: 1oa8jnbmYiN4T-5EO1FtOYPoTuvoG9YRHROXlnfXy5C4
    availability:
      - RUNTIME

  - variable: RENT_LEADS_SHEET_TAB
    value: 계산기_raw
    availability:
      - RUNTIME

  - variable: GCLOUD_PROJECT
    value: mgrv-growth-opservice-db
    availability:
      - RUNTIME

  # ⚠️ DATA_GO_KR_API_KEY · VWORLD_API_KEY는 apphosting.yaml의 secret 매핑 미사용.
  # Firebase App Hosting의 알려진 platform 버그
  # (https://github.com/GoogleCloudPlatform/buildpacks/issues/561) 우회를 위해
  # 코드에서 직접 Secret Manager API 호출 (src/lib/secrets-bootstrap.ts).
  # Runtime SA(firebase-app-hosting-compute@...)가 secret access 권한 보유.
  # Sheets API 인증은 동일 runtime SA의 ADC 자동 처리.
